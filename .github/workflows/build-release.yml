name: Build and Release Android App

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build & Publish Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Grant Execute Permission to Gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Locate and Rename APK
        run: |
          # Create a professional name for the APK
          VERSION_NAME="latest"
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION_NAME="${{ github.ref_name }}"
          else
            VERSION_NAME="debug-${{ github.sha }}"
            VERSION_NAME=${VERSION_NAME:0:12} # truncate sha
          fi
          
          APK_NAME="CopyImage_${VERSION_NAME}.apk"
          echo "APK_NAME=$APK_NAME" >> $GITHUB_ENV
          
          # Find the compiled APK and move/rename it
          mkdir -p build-artifacts
          cp app/build/outputs/apk/debug/app-debug.apk build-artifacts/$APK_NAME
          echo "Created artifact at build-artifacts/$APK_NAME"

      - name: Upload Build Artifact (Actions)
        uses: actions/upload-artifact@v4
        with:
          name: CopyImage-Apk
          path: build-artifacts/${{ env.APK_NAME }}
          retention-days: 14

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Release ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          files: build-artifacts/${{ env.APK_NAME }}
          draft: false
          prerelease: false
          generate_release_notes: true
          body: |
            ## 🎉 CopyImage Release ${{ github.ref_name }}
            
            ¡La nueva versión de **CopyImage** ya está lista! 🚀
            
            ### 📦 Descargas
            * Descarga la aplicación directamente instalable desde los assets adjuntos a continuación: **`${{ env.APK_NAME }}`**
            
            ---
            *Este release ha sido generado automáticamente por GitHub Actions.*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
